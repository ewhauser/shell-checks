id: SH-057
name: avoid-ls-grep-pipelines
summary: Parsing `ls` output through `grep` couples your logic to directory formatting and can fail on odd filenames or flags.
shells:
- sh
- bash
- dash
- ksh
example: examples/057.sh
rationale: Use globbing, a `for` loop, or a filename-aware tool when you need to select files by name.
