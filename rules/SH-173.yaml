id: SH-173
name: misused-backslash-sequence
summary: A backslash in plain shell text usually becomes literal text or just suppresses alias expansion.
shells:
- sh
- bash
- dash
- ksh
example: examples/173.sh
rationale: Use `printf` or `$'...'` for escape sequences, and keep a leading backslash only when you intentionally want alias suppression.
