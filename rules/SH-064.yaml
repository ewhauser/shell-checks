id: SH-064
name: grep-line-count-pipeline
summary: Counting matches with `grep ... | wc -l` wastes a process and makes the count depend on an extra pipeline stage.
shells:
- sh
- bash
- dash
- ksh
example: examples/064.sh
rationale: Use `grep -c` when you only need the number of matching lines, and keep the pipeline only when `wc` is doing something else.
