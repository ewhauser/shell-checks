id: SH-060
name: sudo-redirection-before-escalation
summary: A redirect attached to `sudo` is opened by the current shell first, so the file access happens before privileges change.
shells:
- sh
- bash
- dash
- ksh
example: examples/060.sh
rationale: Put the redirection inside the elevated command or use a helper like `tee` so the privileged process opens the file.
