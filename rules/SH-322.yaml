id: SH-322
name: missing-done-in-for-loop
summary: An unfinished `for` loop triggers ShellCheck 1062 when it reaches EOF without a matching `done`.
shells:
- sh
- bash
- dash
- ksh
example: examples/322.sh
rationale: Include the loop body but omit only the closing `done` so ShellCheck reports just the missing terminator.
