id: SH-063
name: quoted-positional-star-in-loop
summary: Putting `"$*"` in a loop input list turns all positional parameters into one item and makes the loop run once.
shells:
- sh
- bash
- dash
- ksh
example: examples/063.sh
rationale: Iterate over `"$@"` when you need one pass per argument, and reserve `"$*"` for cases where the combined string is what you want.
